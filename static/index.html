<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Task Manager</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&display=swap');
  :root {
    --bg:#0a0a0f;--bg2:#12121a;--bg3:#1a1a26;--card:#16161f;
    --border:#2a2a3a;--text:#e4e4ed;--text2:#8888a0;
    --accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;
    --yellow:#fdcb6e;--orange:#e17055;--blue:#74b9ff;--red:#ff6b6b;
    --radius:12px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
  .app{max-width:480px;margin:0 auto;padding:0 16px 100px;}

  .header{padding:20px 0 16px;position:sticky;top:0;background:var(--bg);z-index:100;border-bottom:1px solid var(--border);margin-bottom:16px;}
  .header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px;}
  .header-sub{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:4px;}
  .mock-badge{display:inline-block;background:var(--orange);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:8px;text-transform:uppercase;vertical-align:middle;}

  .tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:20px;}
  .tab{flex:1;padding:10px 16px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--text2);border:none;background:transparent;font-family:inherit;}
  .tab.active{background:var(--accent);color:white;box-shadow:0 2px 12px rgba(108,92,231,.4);}

  .status-group{margin-bottom:20px;}
  .status-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 4px;}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .status-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);}
  .status-count{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text2);background:var(--bg3);padding:2px 6px;border-radius:4px;}

  .task-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;transition:all .15s;cursor:pointer;position:relative;overflow:hidden;}
  .task-card:active{transform:scale(.98);background:var(--bg3);}
  .task-key{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent2);font-weight:600;margin-bottom:4px;}
  .task-summary{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:8px;}
  .task-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;}
  .task-status-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}

  .task-actions{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
  .task-action-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;}
  .task-action-btn:hover{border-color:var(--accent);color:var(--accent2);}

  .empty{text-align:center;padding:60px 20px;color:var(--text2);}
  .empty-icon{font-size:48px;margin-bottom:16px;opacity:.5;}
  .empty h3{font-size:16px;margin-bottom:8px;color:var(--text);}

  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent2);margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}

  .field-group{margin-bottom:16px;}
  .field-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
  .field-required{color:var(--red);font-size:14px;line-height:1;}

  input[type="text"],textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--text);font-family:'Manrope',sans-serif;outline:none;transition:border-color .2s;-webkit-appearance:none;}
  input:focus,textarea:focus{border-color:var(--accent);}
  textarea{min-height:80px;resize:vertical;}

  .chip-wrap{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text);font-family:inherit;line-height:1.3;}
  .chip.active{background:var(--accent);border-color:var(--accent);color:white;}
  .chip.multi.active{background:transparent;border-color:var(--accent);color:var(--accent2);position:relative;padding-left:28px;}
  .chip.multi.active::before{content:'\2713';position:absolute;left:10px;font-size:12px;font-weight:700;color:var(--accent);}

  .file-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);}
  .file-zone:hover,.file-zone.drag{border-color:var(--accent);background:rgba(108,92,231,.08);}
  .file-zone-text{font-size:13px;color:var(--text2);}
  .file-zone-icon{font-size:28px;margin-bottom:8px;opacity:.6;}
  .file-info{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-top:8px;font-size:12px;color:var(--text2);}
  .file-info .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
  .file-remove{color:var(--red);cursor:pointer;font-weight:700;padding:0 4px;}

  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--accent);color:white;box-shadow:0 4px 16px rgba(108,92,231,.3);}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}

  .success-card{background:var(--card);border:1px solid var(--green);border-radius:var(--radius);padding:24px;text-align:center;margin:40px 0;}
  .success-icon{font-size:48px;margin-bottom:12px;}
  .success-key{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--accent2);margin-bottom:4px;}
  .success-summary{font-size:14px;color:var(--text2);margin-bottom:16px;}
  .success-link{display:inline-block;color:var(--accent2);font-size:13px;text-decoration:none;padding:8px 16px;border:1px solid var(--accent);border-radius:8px;margin-bottom:16px;}

  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-center{display:flex;justify-content:center;align-items:center;padding:60px 0;color:var(--text2);font-size:13px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn .3s ease forwards;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;
const tg = window.Telegram?.WebApp;
const isTG = !!(tg && tg.initData);

function getInitData() { return tg?.initData || ""; }

async function api(method, path, body = null) {
  const opts = { method, headers: { "X-Telegram-Init-Data": getInitData() } };
  if (body && !(body instanceof FormData)) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  } else if (body instanceof FormData) {
    opts.body = body;
  }
  const resp = await fetch(path, opts);
  return resp.json();
}

const ALL_STATUSES = ["To Do","Ready for Development","In Progress","In Review","Done"];

function TaskList({tasks, loading, onStatusChange, mockMode}) {
  if (loading) return <div className="loading-center"><span className="spinner"/> Loading...</div>;
  if (!tasks.length) return <div className="empty fade-in"><div className="empty-icon">&#128203;</div><h3>Нет задач</h3><p>Создай первую задачу</p></div>;

  const grouped = {}; const orders = {};
  tasks.forEach(t => {
    if (!grouped[t.status]) { grouped[t.status] = []; orders[t.status] = t.status_order; }
    grouped[t.status].push(t);
  });

  return <div>{Object.keys(grouped).sort((a,b) => (orders[a]||99)-(orders[b]||99)).map((status, i) =>
    <div className="status-group fade-in" key={status} style={{animationDelay: `${i*0.05}s`}}>
      <div className="status-header">
        <div className="status-dot" style={{background: grouped[status][0]?.status_color}}/>
        <span className="status-name">{grouped[status][0]?.status_label}</span>
        <span className="status-count">{grouped[status].length}</span>
      </div>
      {grouped[status].map(t =>
        <div className="task-card" key={t.jira_key} onClick={() => { if(isTG && t.jira_url !== '#') tg.openLink(t.jira_url); }}>
          <div style={{position:'absolute',left:0,top:0,bottom:0,width:3,background:t.status_color}}/>
          <div className="task-key">{t.jira_key}</div>
          <div className="task-summary">{t.summary}</div>
          <div className="task-meta">
            <span className="task-status-badge" style={{background:t.status_color+'20',color:t.status_color}}>{t.status_label}</span>
            <span>{new Date(t.created_at).toLocaleDateString()}</span>
          </div>
          {mockMode && <div className="task-actions">
            {ALL_STATUSES.filter(s => s !== t.status).map(s =>
              <button key={s} className="task-action-btn"
                onClick={(e) => {e.stopPropagation(); onStatusChange(t.jira_key, s);}}>
                {s}
              </button>
            )}
          </div>}
        </div>
      )}
    </div>
  )}</div>;
}

function FileField({field, onChange}) {
  const inputRef = useRef(null);
  const [dragOver, setDragOver] = useState(false);
  const [file, setFile] = useState(null);
  const handleFile = (f) => { setFile(f); onChange(f); };
  return <div>
    <div className={`file-zone ${dragOver ? 'drag' : ''}`}
      onClick={() => inputRef.current?.click()}
      onDragOver={e => {e.preventDefault(); setDragOver(true);}}
      onDragLeave={() => setDragOver(false)}
      onDrop={e => {e.preventDefault(); setDragOver(false); if(e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);}}>
      <div className="file-zone-icon">&#128206;</div>
      <div className="file-zone-text">Нажми или перетащи файл<br/><small>ZIP, PNG, PDF до 50MB</small></div>
      <input ref={inputRef} type="file" style={{display:'none'}} onChange={e => { if(e.target.files[0]) handleFile(e.target.files[0]); }}/>
    </div>
    {file && <div className="file-info">
      <span className="fname">{file.name}</span>
      <span style={{color:'var(--text2)'}}>{(file.size/1024/1024).toFixed(1)}MB</span>
      <span className="file-remove" onClick={e => {e.stopPropagation(); setFile(null); onChange(null);}}>&#10005;</span>
    </div>}
  </div>;
}

function CreateTask({templates, onCreated}) {
  const [selected, setSelected] = useState(null);
  const [formData, setFormData] = useState({});
  const [files, setFiles] = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [result, setResult] = useState(null);
  const tplKeys = Object.keys(templates);
  const tpl = selected ? templates[selected] : null;

  const handleChange = (key, val) => setFormData(p => ({...p, [key]: val}));
  const handleMultiToggle = (key, opt) => {
    setFormData(p => {
      const arr = Array.isArray(p[key]) ? [...p[key]] : [];
      const idx = arr.indexOf(opt);
      if (idx >= 0) arr.splice(idx, 1); else arr.push(opt);
      return {...p, [key]: arr};
    });
  };

  const canSubmit = () => {
    if (!tpl) return false;
    for (const sec of tpl.sections) {
      for (const f of sec.fields) {
        if (!f.required) continue;
        const v = formData[f.key];
        if (f.type === 'multi_select') { if (!v || !v.length) return false; }
        else if (f.type === 'file') continue;
        else { if (!v || !String(v).trim()) return false; }
      }
    }
    return true;
  };

  const handleSubmit = async () => {
    if (!canSubmit()) return;
    setSubmitting(true);
    try {
      const hasFiles = Object.values(files).some(f => f);
      let res;
      if (hasFiles) {
        const fd = new FormData();
        fd.append("template", selected);
        fd.append("data", JSON.stringify(formData));
        Object.entries(files).forEach(([key, file]) => { if (file) fd.append("file_" + key, file); });
        res = await api("POST", "/api/tasks", fd);
      } else {
        res = await api("POST", "/api/tasks", {template: selected, data: formData});
      }
      if (res.ok) {
        setResult(res);
        if(isTG) tg.HapticFeedback?.notificationOccurred("success");
      } else { alert(res.error || "Error"); }
    } catch(e) { alert("Connection error"); }
    setSubmitting(false);
  };

  const reset = () => { setSelected(null); setFormData({}); setFiles({}); setResult(null); onCreated(); };

  if (result) return <div className="fade-in">
    <div className="success-card">
      <div className="success-icon">&#9989;</div>
      <div className="success-key">{result.jira_key}</div>
      <div className="success-summary">{result.summary}</div>
      {result.jira_url !== '#' && <a className="success-link" href={result.jira_url} target="_blank"
        onClick={e => { if(isTG) {e.preventDefault(); tg.openLink(result.jira_url);} }}>
        Open in Jira &#8599;</a>}
      <br/>
      <button className="btn btn-primary" onClick={reset} style={{marginTop:12}}>Ещё таску</button>
    </div>
  </div>;

  return <div className="fade-in">
    {!selected && <div>
      <div className="section-title">Выбери тип задачи</div>
      {tplKeys.map(key =>
        <div key={key} className="task-card" onClick={() => {setSelected(key); setFormData({}); setFiles({});
          if(isTG) tg.HapticFeedback?.selectionChanged();}}>
          <div className="task-summary">{templates[key].name}</div>
          <div className="task-meta">{templates[key].description}</div>
        </div>
      )}
    </div>}

    {tpl && tpl.sections.map((sec, si) =>
      <div key={si}>
        <div className="section-title">{sec.title}</div>
        {sec.fields.map(field => <div className="field-group" key={field.key}>
          <div className="field-label">
            {field.label}
            {field.required && <span className="field-required">*</span>}
          </div>
          {field.type === 'select' && <div className="chip-wrap">
            {field.options.map(opt =>
              <button key={opt} className={`chip ${formData[field.key] === opt ? 'active' : ''}`}
                onClick={() => handleChange(field.key, opt)}>{opt}</button>
            )}
          </div>}
          {field.type === 'multi_select' && <div className="chip-wrap">
            {field.options.map(opt =>
              <button key={opt} className={`chip multi ${(formData[field.key] || []).includes(opt) ? 'active' : ''}`}
                onClick={() => handleMultiToggle(field.key, opt)}>{opt}</button>
            )}
          </div>}
          {field.type === 'text' && <input type="text" placeholder={field.placeholder || ''}
            value={formData[field.key] || ''} onChange={e => handleChange(field.key, e.target.value)}/>}
          {field.type === 'textarea' && <textarea placeholder={field.placeholder || ''}
            value={formData[field.key] || ''} onChange={e => handleChange(field.key, e.target.value)}/>}
          {field.type === 'file' && <FileField field={field}
            onChange={f => setFiles(p => ({...p, [field.key]: f}))}/>}
        </div>)}
      </div>
    )}

    {tpl && <button className="btn btn-primary" disabled={!canSubmit() || submitting} onClick={handleSubmit}
      style={{marginTop:16}}>
      {submitting ? <><span className="spinner"/> Создаю...</> : 'Создать задачу'}
    </button>}
    {selected && <button className="btn" onClick={() => setSelected(null)}
      style={{marginTop:8, background:'transparent', color:'var(--text2)', border:'1px solid var(--border)'}}>
      &#8592; Назад</button>}
  </div>;
}

function App() {
  const [tab, setTab] = useState("tasks");
  const [tasks, setTasks] = useState([]);
  const [templates, setTemplates] = useState({});
  const [loading, setLoading] = useState(true);
  const [mockMode, setMockMode] = useState(false);
  const userName = tg?.initDataUnsafe?.user?.first_name || "Dev";

  const loadTasks = useCallback(async () => {
    setLoading(true);
    try { const d = await api("GET", "/api/tasks"); if(Array.isArray(d)) setTasks(d); } catch(e){}
    setLoading(false);
  }, []);

  const changeStatus = async (jira_key, status) => {
    await api("POST", "/api/tasks/status", {jira_key, status});
    loadTasks();
  };

  useEffect(() => {
    if(isTG) { tg.ready(); tg.expand(); tg.setHeaderColor('#0a0a0f'); tg.setBackgroundColor('#0a0a0f'); }
    loadTasks();
    api("GET", "/api/templates").then(d => { if(d && !d.error) setTemplates(d); });
    // Check if mock mode
    api("GET", "/api/statuses").then(() => {
      fetch("/api/tasks/status", {method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({})})
        .then(r => { if(r.status !== 403) setMockMode(true); });
    });
  }, []);

  return <div className="app">
    <div className="header">
      <h1>Task Manager {mockMode && <span className="mock-badge">dev mode</span>}</h1>
      <div className="header-sub">{userName} // {tasks.length} tasks</div>
    </div>
    <div className="tabs">
      <button className={`tab ${tab==='tasks'?'active':''}`} onClick={() => {setTab('tasks'); loadTasks();}}>Мои таски</button>
      <button className={`tab ${tab==='create'?'active':''}`} onClick={() => setTab('create')}>Новая таска</button>
    </div>
    {tab === "tasks" && <TaskList tasks={tasks} loading={loading} mockMode={mockMode} onStatusChange={changeStatus}/>}
    {tab === "create" && <CreateTask templates={templates} onCreated={() => {loadTasks(); setTab('tasks');}}/>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
