<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Task Manager 13Buyers</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Manrope:wght@400;500;600;700&display=swap');

  /* ── Theme: Soft Plum (default) ────────── */
  [data-theme="purple"]{
    --bg:#1a1525;--bg2:#211c2e;--bg3:#2a2438;--card:#231e30;
    --border:#352e45;--text:#e5e0f0;--text2:#9990ad;
    --accent:#a78bfa;--accent2:#c4b5fd;--green:#86efac;
    --orange:#fdba74;--red:#fca5a5;--radius:12px;
    --header-bg:#1a1525;
  }

  /* ── Theme: Morning Mist ───────────────── */
  [data-theme="light"]{
    --bg:#f7f6f3;--bg2:#ffffff;--bg3:#efede8;--card:#ffffff;
    --border:#e2dfd8;--text:#2d2a26;--text2:#8a8580;
    --accent:#8b7ec8;--accent2:#6d5fad;--green:#7bc4a5;
    --orange:#d4956a;--red:#cf8080;--radius:12px;
    --header-bg:#f7f6f3;
  }

  /* ── Theme: Ocean Dusk ─────────────────── */
  [data-theme="cyber"]{
    --bg:#131920;--bg2:#19202a;--bg3:#1f2733;--card:#1a2230;
    --border:#2a3444;--text:#dce4ee;--text2:#7a8ea5;
    --accent:#64b5f6;--accent2:#90caf9;--green:#81c784;
    --orange:#ffb74d;--red:#ef9a9a;--radius:12px;
    --header-bg:#131920;
  }

  [data-theme="light"] .tab.active{box-shadow:0 2px 12px rgba(139,126,200,.25);}
  [data-theme="light"] .btn-primary{box-shadow:0 4px 16px rgba(139,126,200,.2);}
  [data-theme="light"] .task-card{box-shadow:0 1px 4px rgba(0,0,0,.04);}

  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Manrope',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;}
  .app{max-width:480px;margin:0 auto;padding:0 16px 100px;}
  .header{padding:20px 0 16px;position:sticky;top:0;background:var(--header-bg);z-index:100;border-bottom:1px solid var(--border);margin-bottom:16px;transition:background .3s;}
  .header-row{display:flex;align-items:center;justify-content:space-between;}
  .header h1{font-size:18px;font-weight:700;letter-spacing:-0.3px;}
  .header-sub{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace;margin-top:4px;}
  .mock-badge{display:inline-block;background:var(--orange);color:#000;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:8px;text-transform:uppercase;vertical-align:middle;}

  /* Theme switcher */
  .theme-switch{display:flex;gap:6px;}
  .theme-dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;position:relative;}
  .theme-dot.active{border-color:var(--accent);transform:scale(1.15);}
  .theme-dot[data-t="purple"]{background:linear-gradient(135deg,#a78bfa,#1a1525);}
  .theme-dot[data-t="light"]{background:linear-gradient(135deg,#f7f6f3,#e2dfd8);border:2px solid #d4d0c8;}
  .theme-dot[data-t="light"].active{border-color:#8b7ec8;}
  .theme-dot[data-t="cyber"]{background:linear-gradient(135deg,#64b5f6,#131920);}

  .tabs{display:flex;gap:4px;background:var(--bg2);border-radius:10px;padding:4px;margin-bottom:20px;transition:background .3s;}
  .tab{flex:1;padding:10px 16px;text-align:center;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:all .2s;color:var(--text2);border:none;background:transparent;font-family:inherit;}
  .tab.active{background:var(--accent);color:white;box-shadow:0 2px 12px rgba(108,92,231,.4);}
  .status-group{margin-bottom:20px;}
  .status-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding:0 4px;}
  .status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .status-name{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);}
  .status-count{font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text2);background:var(--bg3);padding:2px 6px;border-radius:4px;}
  .task-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:8px;transition:all .15s;cursor:pointer;position:relative;overflow:hidden;}
  .task-card:active{transform:scale(.98);background:var(--bg3);}
  .task-key{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--accent2);font-weight:600;margin-bottom:4px;}
  .task-summary{font-size:14px;font-weight:500;line-height:1.4;margin-bottom:8px;}
  .task-meta{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace;flex-wrap:wrap;}
  .task-status-badge{padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;}
  .task-actions{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}
  .task-action-btn{font-size:10px;padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg2);color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;}
  .task-action-btn:hover{border-color:var(--accent);color:var(--accent2);}
  .empty{text-align:center;padding:60px 20px;color:var(--text2);}
  .empty-icon{font-size:48px;margin-bottom:16px;opacity:.5;}
  .empty h3{font-size:16px;margin-bottom:8px;color:var(--text);}
  .section-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--accent2);margin:24px 0 12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
  .field-group{margin-bottom:16px;}
  .field-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px;display:flex;align-items:center;gap:4px;}
  .field-required{color:var(--red);font-size:14px;line-height:1;}
  input[type="text"],textarea{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;font-size:14px;color:var(--text);font-family:'Manrope',sans-serif;outline:none;transition:border-color .2s,background .3s;-webkit-appearance:none;}
  input:focus,textarea:focus{border-color:var(--accent);}
  textarea{min-height:80px;resize:vertical;}
  .chip-wrap{display:flex;gap:6px;flex-wrap:wrap;}
  .chip{padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;font-size:13px;cursor:pointer;transition:all .15s;color:var(--text);font-family:inherit;line-height:1.3;}
  .chip.active{background:var(--accent);border-color:var(--accent);color:white;}
  .chip.multi.active{background:transparent;border-color:var(--accent);color:var(--accent2);position:relative;padding-left:28px;}
  .chip.multi.active::before{content:'\2713';position:absolute;left:10px;font-size:12px;font-weight:700;color:var(--accent);}
  .team-card{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:24px 20px;margin-bottom:12px;cursor:pointer;transition:all .2s;text-align:center;}
  .team-card:active{transform:scale(.97);}
  .team-icon{font-size:36px;margin-bottom:8px;}
  .team-name{font-size:16px;font-weight:700;}
  .file-zone{border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--bg2);}
  .file-zone:hover,.file-zone.drag{border-color:var(--accent);background:rgba(108,92,231,.08);}
  .file-zone-text{font-size:13px;color:var(--text2);}
  .file-zone-icon{font-size:28px;margin-bottom:8px;opacity:.6;}
  .file-info{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--bg3);border-radius:8px;margin-top:8px;font-size:12px;color:var(--text2);}
  .file-info .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
  .file-remove{color:var(--red);cursor:pointer;font-weight:700;padding:0 4px;}
  .btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;font-family:'Manrope',sans-serif;cursor:pointer;transition:all .15s;}
  .btn-primary{background:var(--accent);color:white;box-shadow:0 4px 16px rgba(108,92,231,.3);}
  .btn-primary:active{transform:scale(.98);}
  .btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-back{margin-top:8px;background:transparent;color:var(--text2);border:1px solid var(--border);}
  .success-card{background:var(--card);border:1px solid var(--green);border-radius:var(--radius);padding:24px;text-align:center;margin:40px 0;}
  .success-icon{font-size:48px;margin-bottom:12px;}
  .success-key{font-family:'JetBrains Mono',monospace;font-size:18px;font-weight:600;color:var(--accent2);margin-bottom:4px;}
  .success-summary{font-size:14px;color:var(--text2);margin-bottom:16px;}
  .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .loading-center{display:flex;justify-content:center;align-items:center;padding:60px 0;color:var(--text2);font-size:13px;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
  .fade-in{animation:fadeIn .3s ease forwards;}
  .btn-logout{background:transparent;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s;}
  .btn-logout:hover{border-color:var(--red);color:var(--red);}
  .reg-wrap{padding:40px 0;text-align:center;}
  .reg-wrap h2{font-size:22px;margin-bottom:8px;}
  .reg-wrap p{color:var(--text2);font-size:14px;margin-bottom:32px;}
  .reg-form{text-align:left;}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef} = React;
const tg = window.Telegram?.WebApp;
const isTG = !!(tg && tg.initData);
function getInitData(){return tg?.initData||"";}
async function api(method,path,body=null){
  const opts={method,headers:{"X-Telegram-Init-Data":getInitData()}};
  if(body&&!(body instanceof FormData)){opts.headers["Content-Type"]="application/json";opts.body=JSON.stringify(body);}
  else if(body instanceof FormData){opts.body=body;}
  return(await fetch(path,opts)).json();
}
const ALL_STATUSES=["To Do","Ready for Development","In Progress","In Review","Done"];

const THEMES=[
  {id:"purple",label:"Soft Plum",headerBg:"#1a1525"},
  {id:"light",label:"Morning Mist",headerBg:"#f7f6f3"},
  {id:"cyber",label:"Ocean Dusk",headerBg:"#131920"},
];

function useTheme(){
  const[theme,setTheme]=useState(()=>localStorage.getItem("theme")||"purple");
  useEffect(()=>{
    document.documentElement.setAttribute("data-theme",theme);
    localStorage.setItem("theme",theme);
    const t=THEMES.find(x=>x.id===theme);
    if(isTG&&t){try{tg.setHeaderColor(t.headerBg);tg.setBackgroundColor(t.headerBg);}catch(e){}}
  },[theme]);
  return[theme,setTheme];
}

function ThemeSwitch({current,onChange}){
  return<div className="theme-switch">
    {THEMES.map(t=><div key={t.id} className={`theme-dot ${current===t.id?'active':''}`} data-t={t.id}
      title={t.label} onClick={()=>onChange(t.id)}/>)}
  </div>;
}

/* ── Registration ──────────────────────────── */
function Registration({onDone}){
  const[name,setName]=useState("");
  const[tag,setTag]=useState("");
  const[jEmail,setJEmail]=useState("");
  const[jToken,setJToken]=useState("");
  const[saving,setSaving]=useState(false);
  const[error,setError]=useState("");
  const submit=async()=>{
    if(!name.trim()||!tag.trim()||!jEmail.trim()||!jToken.trim())return;
    setSaving(true);setError("");
    const res=await api("POST","/api/profile",{buyer_name:name.trim(),buyer_tag:tag.trim(),jira_email:jEmail.trim(),jira_token:jToken.trim()});
    if(res.ok||res.registered){onDone({buyer_name:name.trim(),buyer_tag:tag.trim()});}
    else{setError(res.error||"Ошибка");}
    setSaving(false);
  };
  return<div className="reg-wrap fade-in">
    <h2>Task Manager 13Buyers</h2>
    <p>Зарегистрируйся чтобы начать</p>
    <div className="reg-form">
      <div className="field-group">
        <div className="field-label">Ник<span className="field-required">*</span></div>
        <input type="text" placeholder="Твой ник в команде" value={name} onChange={e=>setName(e.target.value)}/>
      </div>
      <div className="field-group">
        <div className="field-label">Buyer Tag (как в Jira)<span className="field-required">*</span></div>
        <input type="text" placeholder="@pumba_junior" value={tag} onChange={e=>setTag(e.target.value)}/>
      </div>
      <div className="field-group">
        <div className="field-label">Jira Email<span className="field-required">*</span></div>
        <input type="text" placeholder="your@email.com" value={jEmail} onChange={e=>setJEmail(e.target.value)}/>
      </div>
      <div className="field-group">
        <div className="field-label">Jira API Token<span className="field-required">*</span></div>
        <input type="text" placeholder="ATATT3x..." value={jToken} onChange={e=>setJToken(e.target.value)} style={{fontFamily:'JetBrains Mono, monospace',fontSize:12}}/>
        <div style={{fontSize:11,color:'var(--text2)',marginTop:4,lineHeight:1.5}}>
          <span style={{color:'var(--accent)'}}>Как получить токен:</span><br/>
          1. Открой <a href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank" style={{color:'var(--accent2)',wordBreak:'break-all'}}>id.atlassian.com/manage-profile/security/api-tokens</a><br/>
          2. Нажми «Create API token»<br/>
          3. Назови как угодно → Create<br/>
          4. Скопируй токен и вставь сюда
        </div>
      </div>
      {error&&<div style={{color:'var(--red)',fontSize:13,marginBottom:12}}>{error}</div>}
      <button className="btn btn-primary" disabled={!name.trim()||!tag.trim()||!jEmail.trim()||!jToken.trim()||saving} onClick={submit}>
        {saving?<><span className="spinner"/>Сохраняю...</>:"Поехали!"}
      </button>
    </div>
  </div>;
}

/* ── Task List ─────────────────────────────── */
function TaskList({tasks,loading,onStatusChange,mockMode}){
  if(loading)return<div className="loading-center"><span className="spinner"/>Loading...</div>;
  if(!tasks.length)return<div className="empty fade-in"><div className="empty-icon">&#128203;</div><h3>Нет задач</h3><p>Создай первую задачу</p></div>;
  const grouped={};const orders={};
  tasks.forEach(t=>{if(!grouped[t.status]){grouped[t.status]=[];orders[t.status]=t.status_order;}grouped[t.status].push(t);});
  return<div>{Object.keys(grouped).sort((a,b)=>(orders[a]||99)-(orders[b]||99)).map((status,i)=>
    <div className="status-group fade-in" key={status} style={{animationDelay:`${i*0.05}s`}}>
      <div className="status-header"><div className="status-dot" style={{background:grouped[status][0]?.status_color}}/><span className="status-name">{grouped[status][0]?.status_label}</span><span className="status-count">{grouped[status].length}</span></div>
      {grouped[status].map(t=>
        <div className="task-card" key={t.jira_key} onClick={()=>{if(isTG&&t.jira_url!=='#')tg.openLink(t.jira_url);}}>
          <div style={{position:'absolute',left:0,top:0,bottom:0,width:3,background:t.status_color}}/>
          <div className="task-key">{t.jira_key}</div><div className="task-summary">{t.summary}</div>
          <div className="task-meta"><span className="task-status-badge" style={{background:t.status_color+'20',color:t.status_color}}>{t.status_label}</span>{t.project&&<span style={{background:'var(--bg3)',padding:'2px 6px',borderRadius:4,fontSize:10}}>{t.project}</span>}{t.priority&&<span style={{fontSize:10,color:'var(--text2)'}}>{t.priority}</span>}<span>{new Date(t.created_at).toLocaleDateString()}</span></div>
          {mockMode&&<div className="task-actions">{ALL_STATUSES.filter(s=>s!==t.status).map(s=><button key={s} className="task-action-btn" onClick={e=>{e.stopPropagation();onStatusChange(t.jira_key,s);}}>{s}</button>)}</div>}
        </div>)}
    </div>)}</div>;
}

/* ── File Field ────────────────────────────── */
function FileField({onChange}){
  const inputRef=useRef(null);const[dragOver,setDragOver]=useState(false);const[file,setFile]=useState(null);
  const handleFile=f=>{setFile(f);onChange(f);};
  return<div>
    <div className={`file-zone ${dragOver?'drag':''}`} onClick={()=>inputRef.current?.click()}
      onDragOver={e=>{e.preventDefault();setDragOver(true);}} onDragLeave={()=>setDragOver(false)}
      onDrop={e=>{e.preventDefault();setDragOver(false);if(e.dataTransfer.files[0])handleFile(e.dataTransfer.files[0]);}}>
      <div className="file-zone-icon">&#128206;</div>
      <div className="file-zone-text">Нажми или перетащи файл<br/><small>ZIP, PNG, PDF до 50MB</small></div>
      <input ref={inputRef} type="file" style={{display:'none'}} onChange={e=>{if(e.target.files[0])handleFile(e.target.files[0]);}}/>
    </div>
    {file&&<div className="file-info"><span className="fname">{file.name}</span><span style={{color:'var(--text2)'}}>{(file.size/1024/1024).toFixed(1)}MB</span><span className="file-remove" onClick={e=>{e.stopPropagation();setFile(null);onChange(null);}}>&#10005;</span></div>}
  </div>;
}

/* ── Create Task ───────────────────────────── */
function CreateTask({teams,templates,onCreated}){
  const[step,setStep]=useState('team');
  const[team,setTeam]=useState(null);
  const[selected,setSelected]=useState(null);
  const[formData,setFormData]=useState({});
  const[files,setFiles]=useState({});
  const[submitting,setSubmitting]=useState(false);
  const[result,setResult]=useState(null);
  const tpl=selected?templates[selected]:null;
  const teamTemplates=team?Object.entries(templates).filter(([k,v])=>v.team===team):[];
  const handleChange=(key,val)=>setFormData(p=>({...p,[key]:val}));
  const handleMultiToggle=(key,opt)=>{setFormData(p=>{const arr=Array.isArray(p[key])?[...p[key]]:[];const idx=arr.indexOf(opt);if(idx>=0)arr.splice(idx,1);else arr.push(opt);return{...p,[key]:arr};});};
  const canSubmit=()=>{if(!tpl)return false;if(!formData["task_name"]||!formData["task_name"].trim())return false;for(const sec of tpl.sections){for(const f of sec.fields){if(!f.required)continue;const v=formData[f.key];if(f.type==='multi_select'){if(!v||!v.length)return false;}else if(f.type==='file')continue;else{if(!v||!String(v).trim())return false;}}}return true;};
  const handleSubmit=async()=>{if(!canSubmit())return;setSubmitting(true);try{const hasFiles=Object.values(files).some(f=>f);let res;if(hasFiles){const fd=new FormData();fd.append("template",selected);fd.append("data",JSON.stringify(formData));Object.entries(files).forEach(([k,f])=>{if(f)fd.append("file_"+k,f);});res=await api("POST","/api/tasks",fd);}else{res=await api("POST","/api/tasks",{template:selected,data:formData});}if(res.ok){setResult(res);if(isTG)tg.HapticFeedback?.notificationOccurred("success");}else{alert(res.error||"Error");}}catch(e){alert("Connection error");}setSubmitting(false);};
  const fullReset=()=>{setStep('team');setTeam(null);setSelected(null);setFormData({});setFiles({});setResult(null);onCreated();};

  if(result)return<div className="fade-in"><div className="success-card"><div className="success-icon">&#9989;</div><div className="success-key">{result.jira_key}</div><div className="success-summary">{result.summary}</div><button className="btn btn-primary" onClick={fullReset} style={{marginTop:12}}>Ещё таску</button></div></div>;

  if(step==='team')return<div className="fade-in">
    <div className="section-title">Куда отправить задачу?</div>
    {Object.entries(teams).map(([key,t])=><div key={key} className="team-card" onClick={()=>{setTeam(key);setStep('template');if(isTG)tg.HapticFeedback?.selectionChanged();}}><div className="team-icon">{t.emoji}</div><div className="team-name">{t.name}</div></div>)}
  </div>;

  if(step==='template')return<div className="fade-in">
    <div className="section-title">{teams[team]?.name} / Тип задачи</div>
    {teamTemplates.map(([key,t])=><div key={key} className="task-card" onClick={()=>{setSelected(key);setFormData({});setFiles({});setStep('form');if(isTG)tg.HapticFeedback?.selectionChanged();}}><div className="task-summary">{t.name}</div><div className="task-meta">{t.description}</div></div>)}
    <button className="btn btn-back" onClick={()=>{setStep('team');setTeam(null);}}>&#8592; Назад</button>
  </div>;

  return<div className="fade-in">
    <div className="section-title" style={{marginTop:0}}>{tpl?.name}</div>
    {tpl&&<div className="field-group">
      <div className="field-label">Название таски<span className="field-required">*</span></div>
      <input type="text" placeholder="Короткое описание задачи" value={formData["task_name"]||''} onChange={e=>handleChange("task_name",e.target.value)}/>
    </div>}
    {tpl&&tpl.sections.map((sec,si)=><div key={si}><div className="section-title">{sec.title}</div>
      {sec.fields.map(field=><div className="field-group" key={field.key}>
        <div className="field-label">{field.label}{field.required&&<span className="field-required">*</span>}</div>
        {field.type==='select'&&<div className="chip-wrap">{field.options.map(opt=><button key={opt} className={`chip ${formData[field.key]===opt?'active':''}`} onClick={()=>handleChange(field.key,opt)}>{opt}</button>)}</div>}
        {field.type==='multi_select'&&<div className="chip-wrap">{field.options.map(opt=><button key={opt} className={`chip multi ${(formData[field.key]||[]).includes(opt)?'active':''}`} onClick={()=>handleMultiToggle(field.key,opt)}>{opt}</button>)}</div>}
        {field.type==='text'&&<input type="text" placeholder={field.placeholder||''} value={formData[field.key]||''} onChange={e=>handleChange(field.key,e.target.value)}/>}
        {field.type==='textarea'&&<textarea placeholder={field.placeholder||''} value={formData[field.key]||''} onChange={e=>handleChange(field.key,e.target.value)}/>}
        {field.type==='file'&&<FileField onChange={f=>setFiles(p=>({...p,[field.key]:f}))}/>}
      </div>)}</div>)}
    {tpl&&<button className="btn btn-primary" disabled={!canSubmit()||submitting} onClick={handleSubmit} style={{marginTop:16}}>{submitting?<><span className="spinner"/>Создаю...</>:'Создать задачу'}</button>}
    <button className="btn btn-back" onClick={()=>{setStep('template');setSelected(null);setFormData({});setFiles({});}}>&#8592; Назад</button>
  </div>;
}

/* ── App ───────────────────────────────────── */
function App(){
  const[theme,setTheme]=useTheme();
  const[profile,setProfile]=useState(null);
  const[loading,setLoading]=useState(true);
  const[tab,setTab]=useState("tasks");
  const[tasks,setTasks]=useState([]);
  const[teams,setTeams]=useState({});
  const[templates,setTemplates]=useState({});
  const[tasksLoading,setTasksLoading]=useState(true);
  const[mockMode,setMockMode]=useState(false);

  const loadTasks=useCallback(async()=>{setTasksLoading(true);try{const d=await api("GET","/api/tasks");if(Array.isArray(d))setTasks(d);}catch(e){}setTasksLoading(false);},[]);
  const changeStatus=async(jk,s)=>{await api("POST","/api/tasks/status",{jira_key:jk,status:s});loadTasks();};

  useEffect(()=>{
    if(isTG){tg.ready();tg.expand();}
    api("GET","/api/profile").then(d=>{
      if(d.registered){setProfile(d);}
      setLoading(false);
    }).catch(()=>setLoading(false));
    loadTasks();
    api("GET","/api/templates").then(d=>{if(d&&!d.error){setTeams(d.teams||{});setTemplates(d.templates||{});}});
    fetch("/api/tasks/status",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({})}).then(r=>{if(r.status!==403)setMockMode(true);});
  },[]);

  const handleLogout=async()=>{
    if(!confirm("Выйти из аккаунта? Нужно будет заново ввести данные."))return;
    await api("POST","/api/logout");
    setProfile(null);setTasks([]);
  };

  if(loading)return<div className="app"><div className="loading-center"><span className="spinner"/>Loading...</div></div>;

  if(!profile)return<div className="app"><Registration onDone={p=>setProfile(p)}/></div>;

  return<div className="app">
    <div className="header">
      <div className="header-row">
        <h1>Task Manager 13Buyers{mockMode&&<span className="mock-badge">dev</span>}</h1>
        <ThemeSwitch current={theme} onChange={setTheme}/>
      </div>
      <div className="header-sub">{profile.buyer_name} {profile.buyer_tag&&<span style={{color:'var(--accent2)'}}>{profile.buyer_tag}</span>} // {tasks.length} tasks <button className="btn-logout" onClick={handleLogout}>Выйти</button></div>
    </div>
    <div className="tabs">
      <button className={`tab ${tab==='tasks'?'active':''}`} onClick={()=>{setTab('tasks');loadTasks();}}>Мои таски</button>
      <button className={`tab ${tab==='create'?'active':''}`} onClick={()=>setTab('create')}>Новая таска</button>
    </div>
    {tab==="tasks"&&<TaskList tasks={tasks} loading={tasksLoading} mockMode={mockMode} onStatusChange={changeStatus}/>}
    {tab==="create"&&<CreateTask teams={teams} templates={templates} onCreated={()=>{loadTasks();setTab('tasks');}}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
